<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SintéticaBolaños - Registro</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-header">
            <i class='bx bxs-pie-chart-alt-2 auth-icon'></i>
            <h1 class="auth-title">Crear Cuenta</h1>
            <p class="auth-subtitle">Únete a SintéticaBolaños para administrar todo</p>
        </div>

        <div id="register-error" class="error-message">
            El usuario ya existe o hubo un problema.
        </div>

        <div id="register-success" class="success-message">
            ¡Cuenta creada exitosamente! Redirigiendo...
        </div>

        <form id="register-form" class="auth-form">
            <div class="form-group">
                <label for="reg-name">Nombre Completo</label>
                <input type="text" id="reg-name" class="form-control" placeholder="Juan Pérez" required>
            </div>

            <div class="form-group">
                <label for="reg-email">Correo Electrónico</label>
                <input type="email" id="reg-email" class="form-control" placeholder="ejemplo@correo.com" required>
            </div>
            
            <div class="form-group">
                <label for="reg-password">Contraseña</label>
                <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required minlength="6">
            </div>

            <button type="submit" class="btn auth-btn">
                Registrarse <i class='bx bx-user-plus'></i>
            </button>
        </form>

        <div class="auth-footer">
            ¿Ya tienes una cuenta? <a href="login.html" class="auth-link">Inicia sesión</a>
        </div>
    </div>

    <!-- Auth JS -->
    <script src="js/auth.js"></script>
</body>
</html>
